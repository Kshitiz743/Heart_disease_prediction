<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heart Disease Prediction</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay">

<div class="title">

<h1><i class="fa-solid fa-heart-pulse"></i>
Heart Disease Prediction</h1>

<p>
Predict the likelihood of heart disease using a Logistic Regression Machine Learning model.
</p>

</div>

<div class="glass">

<form action="/predict" method="POST">

<div class="grid">

<input type="number" name="age" placeholder="Age" required>

<input type="number" name="sex" placeholder="Sex (1=Male,0=Female)" required>

<input type="number" name="cp" placeholder="Chest Pain Type" required>

<input type="number" name="trestbps" placeholder="Blood Pressure" required>

<input type="number" name="chol" placeholder="Cholesterol" required>

<input type="number" name="fbs" placeholder="Fasting Blood Sugar" required>

<input type="number" name="restecg" placeholder="Rest ECG" required>

<input type="number" name="thalach" placeholder="Max Heart Rate" required>

<input type="number" name="exang" placeholder="Exercise Angina" required>

<input type="number" step="0.1" name="oldpeak" placeholder="Old Peak" required>

<input type="number" name="slope" placeholder="Slope" required>

<input type="number" name="ca" placeholder="Major Vessels" required>

<input type="number" name="thal" placeholder="Thal" required>

</div>

<button>

<i class="fa-solid fa-heart-circle-check"></i>

Predict Heart Disease

</button>

</form>

<div class="footer">

Educational Project • Flask • Logistic Regression • Scikit-Learn

</div>

</div>

</div>

</body>

</html>
