<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Heart Disease Prediction</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container">

<h1>❤️ Heart Disease Prediction System</h1>

<p class="subtitle">
Predict the possibility of heart disease using Machine Learning
</p>

<form action="/predict" method="POST">

<div class="form-grid">

<div class="form-group">
<label>Age</label>
<input type="number" name="age" required min="1">
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Blood Pressure</label>
<input type="number" name="blood_pressure" required>
</div>

<div class="form-group">
<label>Cholesterol Level</label>
<input type="number" name="cholesterol" required>
</div>

<div class="form-group">
<label>Exercise Habits</label>
<select name="exercise">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>
</div>

<div class="form-group">
<label>Smoking</label>
<select name="smoking">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Family Heart Disease</label>
<select name="family_history">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Diabetes</label>
<select name="diabetes">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>BMI</label>
<input type="number" step="0.01" name="bmi" required>
</div>

<div class="form-group">
<label>High Blood Pressure</label>
<select name="high_bp">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Low HDL Cholesterol</label>
<select name="low_hdl">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>High LDL Cholesterol</label>
<select name="high_ldl">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="form-group">
<label>Alcohol Consumption</label>
<select name="alcohol">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Stress Level</label>
<select name="stress">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Sleep Hours</label>
<input type="number" step="0.1" name="sleep" required>
</div>

<div class="form-group">
<label>Sugar Consumption</label>
<select name="sugar">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Triglyceride Level</label>
<input type="number" name="triglyceride" required>
</div>

<div class="form-group">
<label>Fasting Blood Sugar</label>
<input type="number" name="fasting" required>
</div>

<div class="form-group">
<label>CRP Level</label>
<input type="number" step="0.01" name="crp" required>
</div>

<div class="form-group">
<label>Homocysteine Level</label>
<input type="number" step="0.01" name="homocysteine" required>
</div>

</div>

<div class="btn-box">

<button type="submit">

Predict Heart Disease

</button>

</div>

</form>

</div>

</div>

</body>

</html>
